# =============================================================================
# E2E — Playwright tests (Chromium)
# =============================================================================
# Triggered on PRs that touch application code only (path filter keeps CI fast).
# Builds the Next.js app, starts the production server, then runs the test suite.
#
# Note: E2E tests verify UI/UX and form validation. They do NOT send real magic
# links or make real Supabase calls (see e2e/auth.spec.ts for test scope).
# =============================================================================

name: E2E

on:
  pull_request:
    branches: [master]
    paths:
      - 'app/**'
      - 'src/**'
      - 'e2e/**'
      - 'proxy.ts'
      - 'next.config.ts'
      - 'playwright.config.ts'
      - 'package*.json'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: playwright (chromium)
    runs-on: ubuntu-latest
    # Only run on PRs from this repository (not forks) — needs env vars
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-e2e-placeholder-no-real-key
      CRON_SECRET: placeholder-cron-secret-32-chars-minimum
      RATE_LIMIT_PEPPER: placeholder16chars
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --prefer-offline

      # Cache Next.js build
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .next/cache
          key: next-e2e-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: next-e2e-${{ hashFiles('**/package-lock.json') }}-

      # Cache Playwright browsers
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report (on failure)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

# =============================================================================
# CI -- Quality gates (lint . typecheck . unit tests . build . audit)
# =============================================================================
# Triggers: pull_request on any branch, push on master.
# Concurrency: stale runs on the same PR/branch are cancelled automatically.
#
# Security model:
#   - All third-party actions are pinned to a specific commit SHA.
#   - Top-level permissions are read-only; individual jobs request write only
#     when strictly necessary (e.g. codeql results upload).
#   - Jobs that use secrets are gated on head.repo == base.repo to prevent
#     fork-PR secret exfiltration.
#   - The `build` job uses SAFE placeholder values for env vars so the Next.js
#     build can run without requiring real secrets in CI logs.
#   - `smtp-config-check` runs only on push to master (not PRs) and verifies
#     that the Supabase SMTP config has not drifted from expected values.
#     It is continue-on-error:true -- config drift is an alert, not a blocker.
# =============================================================================

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel stale runs on the same ref (saves Actions minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimum permissions -- individual jobs add only what they need
permissions:
  contents: read

env:
  NODE_VERSION_FILE: .nvmrc

jobs:
  # ---------------------------------------------------------------------------
  # Lint -- ESLint (eslint-config-next)
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm run lint

  # ---------------------------------------------------------------------------
  # Type-check -- tsc --noEmit
  # ---------------------------------------------------------------------------
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Unit tests -- Vitest (all tests are mocked, no DB required)
  # ---------------------------------------------------------------------------
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm run test

  # ---------------------------------------------------------------------------
  # Build -- next build with safe placeholder env vars
  #
  # Next.js needs NEXT_PUBLIC_* vars at build time (they are inlined in the
  # bundle). We provide safe placeholder values here; the real values live in
  # Vercel's environment and are injected at Vercel build time.
  #
  # SUPABASE_SERVICE_ROLE_KEY is intentionally NOT provided -- it must never
  # appear in CI logs. Server-only code must not reference it at build time.
  #
  # SUPABASE_ACCESS_TOKEN is intentionally NOT provided -- it is a management
  # token only used by scripts/setup-supabase-smtp.ts, never at app runtime.
  #
  # EMAIL_FROM_ADDRESS: a valid email format is needed for Zod validation to
  # pass in dev mode. We use a safe placeholder that won't trigger prod rules.
  # ---------------------------------------------------------------------------
  build:
    name: build
    runs-on: ubuntu-latest
    # Only run with real secrets on branches that belong to this repo
    # (prevents fork PRs from accessing secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-build-placeholder-no-real-key
      # Stripe + AI keys -- not needed at build time (server runtime only)
      STRIPE_SECRET_KEY: ci-placeholder-no-real-key
      STRIPE_WEBHOOK_SECRET: ci-placeholder-no-real-key
      # Resend -- format placeholder (re_ prefix required by Zod schema in dev mode)
      RESEND_API_KEY: re_ci_placeholder_no_real_key
      # Email sender identity -- safe placeholder (not validated strictly in dev mode)
      EMAIL_FROM_ADDRESS: ci-build@placeholder.example.com
      EMAIL_FROM_NAME: CI Build
      GEMINI_API_KEY: placeholder
      OPENAI_API_KEY: sk-placeholder
      CRON_SECRET: placeholder-cron-secret-32-chars-minimum
      RATE_LIMIT_PEPPER: placeholder16chars
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: npm
      - run: npm ci --prefer-offline
      # Cache the Next.js build output for speed on repeated runs
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .next/cache
          key: next-build-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.css') }}
          restore-keys: |
            next-build-${{ hashFiles('**/package-lock.json') }}-
      - run: npm run build

  # ---------------------------------------------------------------------------
  # Dependency audit -- npm audit (high+ severity, production deps only)
  # ---------------------------------------------------------------------------
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: npm
      - run: npm ci --prefer-offline
      # --omit=dev: only audit production dependencies
      # --audit-level=high: fail only on high/critical CVEs
      - run: npm audit --audit-level=high --omit=dev

  # ---------------------------------------------------------------------------
  # SMTP config drift check -- verify Supabase SMTP config has not drifted
  #
  # Only runs on push to master (not PRs -- requires secrets + runs once per merge).
  # continue-on-error: true -- drift is an alert, not a deployment blocker.
  # If this fails, run `npm run smtp:setup` locally to re-apply the config.
  #
  # Required secrets (in GitHub > Settings > Secrets > Actions):
  #   SUPABASE_PROJECT_REF       -- Project ref (20 lowercase letters)
  #   SUPABASE_ACCESS_TOKEN      -- Personal access token (sbp_...)
  #   RESEND_API_KEY             -- Resend API key (re_...) for config comparison
  #   EMAIL_FROM_ADDRESS         -- Expected from address (auth@jobnomad.app)
  #   EMAIL_FROM_NAME            -- Expected from name (JobNomad)
  # ---------------------------------------------------------------------------
  smtp-config-check:
    name: SMTP config drift check
    runs-on: ubuntu-latest
    # Only run on push to master on the base repo (not PRs, not forks)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'Fugushiva/jobnomad'
    # Drift is an alert, not a build blocker
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}
          cache: npm
      - run: npm ci --prefer-offline
      - name: Verify Supabase SMTP config
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
        run: |
          echo "Checking if SUPABASE_ACCESS_TOKEN is configured..."
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not set -- skipping SMTP config check."
            echo "To enable: add SUPABASE_ACCESS_TOKEN to GitHub Secrets."
            exit 0
          fi
          echo "Running smtp:verify..."
          npm run smtp:verify
      - name: Report drift (if step above exited with code 2)
        if: failure()
        run: |
          echo "::warning::SMTP config drift detected on Supabase."
          echo "::warning::Run 'npm run smtp:setup' locally to re-apply the correct config."
          echo "::warning::See docs/auth-setup.md Section 5 for details."

  # ---------------------------------------------------------------------------
  # Workflow linting -- validate workflow YAML files with actionlint
  # ---------------------------------------------------------------------------
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          fail_level: any

# =============================================================================
# DB — Supabase migrations + pgTAP RLS tests
# =============================================================================
# Triggered on PRs that touch supabase/** (migrations, tests, config, seed).
# Spins up a local Supabase instance (Docker on the runner), applies all
# migrations, then runs the pgTAP test suite.
#
# This is the only way to catch RLS regressions before they hit production.
# Adds ~2 min to the CI cycle, but only runs when DB code changes.
# =============================================================================

name: DB

on:
  pull_request:
    branches: [master]
    paths:
      - 'supabase/**'
      - '.github/workflows/db.yml'

concurrency:
  group: db-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  db-tests:
    name: migrations + pgTAP RLS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: supabase/setup-cli@b579fc8c7122aa485f1d947120eaeb11ee04d312 # v2.0.0
        with:
          version: latest

      # Start local Supabase (PostgreSQL + Auth + etc.) via Docker
      - name: Start Supabase local stack
        run: supabase start
        timeout-minutes: 5

      # Apply all migrations and seed data
      - name: Apply migrations (supabase db reset)
        run: supabase db reset --local
        # db reset --local = drop + recreate local DB + run all migrations + seed

      # Run pgTAP RLS tests
      - name: Run pgTAP tests
        run: supabase test db

      # Always stop to free resources, even on failure
      - name: Stop Supabase
        if: always()
        run: supabase stop

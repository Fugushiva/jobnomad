# =============================================================================
# CodeQL — Static Application Security Testing (SAST)
# =============================================================================
# Scans JavaScript/TypeScript for security vulnerabilities.
# Runs on PR, on push to master, and weekly on Sundays at 02:00 UTC.
#
# Results appear in the Security > Code Scanning tab of the repository.
# Free for public repositories (GitHub Advanced Security).
# =============================================================================

name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly scan: Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results to GitHub

jobs:
  analyze:
    name: CodeQL analysis (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          languages: javascript-typescript
          # Use the default security-extended query suite (includes OWASP Top 10)
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          category: /language:javascript-typescript

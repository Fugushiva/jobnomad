# =============================================================================
# Secret scan — Gitleaks (defense-in-depth for a public repository)
# =============================================================================
# Scans the PR diff for accidentally committed secrets (API keys, tokens, etc.).
# Critical for a PUBLIC repository where any committed secret is immediately
# visible to anyone who clones the repo.
#
# Runs only on pull_request events (not on push to master — the gate is at PR
# time, before merge).
# =============================================================================

name: Secret scan

on:
  pull_request:
    branches: [master]

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # pull-requests: read is needed to access PR diff
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Fetch full history so gitleaks can scan the full diff
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required only for private repos — skip for public

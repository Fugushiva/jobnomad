name: Bug report
description: Signaler un bug ou un comportement inattendu
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire pour nous aider à reproduire et corriger le bug.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Qu'est-ce qui se passe ? Qu'est-ce qui devrait se passer ?
      placeholder: "En cliquant sur X, j'obtiens une erreur Y au lieu de Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte (logs, captures d'écran, environnement)
      description: |
        - Browser / version
        - Message d'erreur exact (console ou Network tab)
        - Captures d'écran si pertinent

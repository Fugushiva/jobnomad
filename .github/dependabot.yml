# Dependabot — automatic dependency update PRs
# - npm packages: weekly on Monday mornings
# - GitHub Actions: weekly (keeps action SHAs up to date)
#
# Grouped updates reduce PR noise: all non-major npm bumps in one PR.

version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    groups:
      # Bundle all patch/minor non-breaking bumps into a single PR
      dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    # Limit PR count to avoid noise
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
    # Ignore major version bumps that break the ecosystem
    ignore:
      # ESLint 10: eslint-config-next plugins not compatible yet
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      # TypeScript 6: ecosystem not ready
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      # @types/node must stay aligned with Node 20.x (Vercel Hobby)
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — keep pinned SHAs current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(ci)
    # Ignore major bumps on Actions that have known breaking changes
    ignore:
      - dependency-name: actions/checkout
        update-types: ["version-update:semver-major"]
      - dependency-name: actions/upload-artifact
        update-types: ["version-update:semver-major"]
      - dependency-name: actions/cache
        update-types: ["version-update:semver-major"]

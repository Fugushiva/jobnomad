# Gitleaks configuration
#
# Allowlist for CI placeholder values that gitleaks misidentifies as secrets.
# These are NOT real secrets -- they are dummy strings intentionally used in
# GitHub Actions workflow files so Next.js can build without real env vars.
#
# We use TWO complementary strategies:
#
# 1. Regex-based path/value allowlisting: for placeholder values in CI workflows.
#    Matches any workflow file containing known safe placeholder patterns.
#
# 2. Fingerprint-level allowlisting: for specific historical commits that
#    gitleaks cannot retroactively ignore with regex rules alone.
#
# IMPORTANT: Any new REAL secret committed accidentally will still be caught.
# These rules only allow patterns that are provably safe (contain "placeholder",
# "ci-build", etc.) or are scoped to non-secret file paths.

[allowlist]
description = "CI workflow placeholder values -- not real secrets"

# ---------------------------------------------------------------------------
# Path + value based rules (preferred -- works for future commits too)
# ---------------------------------------------------------------------------

# Rule: Regex-match placeholder values in GitHub Actions workflow files.
# These values contain "placeholder", "ci-build", or "no-real-key" strings
# which make them unambiguously safe dummy values.
[[allowlist.commits]]
description = "ci workflow placeholder values anywhere"
regexes = [
  # Generic CI placeholders
  "ci-.*placeholder.*",
  "placeholder.*no-real-key",
  ".*-placeholder-.*",
  # Known safe placeholder prefixes in CI build env
  "re_ci_placeholder",
  "ci-build@placeholder",
  "sk-placeholder",
  # Supabase URL placeholder
  "placeholder\\.supabase\\.co",
]
paths = [
  ".github/workflows/.*\\.yml",
]

# ---------------------------------------------------------------------------
# Test fixtures -- explicitly marked fake credentials in unit tests
# ---------------------------------------------------------------------------
# These are dummy strings used in tests that mock fetch and never reach any
# real API. The format includes 'FAKE_TEST_FIXTURE_NOT_REAL' or 'FAKE_' which
# cannot be confused with real credentials.
[[allowlist.commits]]
description = "test fixtures with explicit FAKE markers"
regexes = [
  "FAKE_TEST_FIXTURE_NOT_REAL",
  "FAKE_GENERIC_TEST",
  "FAKE_LOG_LEAK_DETECTOR",
  "FAKE_REDACTED",
]
paths = [
  ".*__tests__/.*",
  ".*\\.test\\.ts",
  ".*\\.test\\.tsx",
  ".*\\.spec\\.ts",
]

# ---------------------------------------------------------------------------
# Fingerprint allowlist (surgical -- only specific historical commits/lines)
# ---------------------------------------------------------------------------

# Source: commit bbf840de (initial .github/workflows/ creation)
# Finding 1: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = sb_publishable_placeholder_for_ci_e2e
#   in .github/workflows/e2e.yml:41 -- gitleaks rule: generic-api-key
# Finding 2: STRIPE_SECRET_KEY = sk_test_placeholder
#   in .github/workflows/ci.yml:103 -- gitleaks rule: stripe-access-token
# Both were fixed in commit ba7c44b (renamed to ci-*-placeholder-no-real-key)
# but gitleaks scans the full PR commit range including historical commits.
fingerprints = [
  "bbf840de2f0e49034b6b1a3dc084b9b8d445acc8:.github/workflows/e2e.yml:generic-api-key:41",
  "bbf840de2f0e49034b6b1a3dc084b9b8d445acc8:.github/workflows/ci.yml:stripe-access-token:103",
]
